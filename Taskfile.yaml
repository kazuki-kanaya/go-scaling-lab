version: "3"

vars:
  CLUSTER_NAME: kind-go-scaling-lab
  IMAGE_NAME: go-scaling-lab-api:local
  NAMESPACE: go-scaling-lab
  SERVICE_NAME: go-api
  MONITORING_NAMESPACE: monitoring
  MONITORING_RELEASE: monitoring
  PROMETHEUS_REPO_NAME: prometheus-community
  PROMETHEUS_REPO_URL: https://prometheus-community.github.io/helm-charts
  MONITORING_CHART: prometheus-community/kube-prometheus-stack
  GRAFANA_SERVICE_NAME: monitoring-grafana
  PROMETHEUS_SERVICE_NAME: monitoring-kube-prometheus-prometheus
  METRICS_SERVER_MANIFEST: deploy/k8s/addons/metrics-server/components.yaml
  KIND_CONFIG: deploy/k8s/kind-config.yaml
  INGRESS_NGINX_MANIFEST_URL: https://raw.githubusercontent.com/kubernetes/ingress-nginx/main/deploy/static/provider/kind/deploy.yaml

tasks:
  default:
    desc: List available tasks
    cmds:
      - task --list

  up:
    desc: Bootstrap cluster, install addons, build/load image, and apply app resources
    cmds:
      - task: cluster:create
      - task: ingress:install
      - task: metrics-server:apply
      - task: image:build
      - task: image:load
      - task: k8s:apply

  down:
    desc: Delete the local kind cluster
    cmds:
      - kind delete cluster --name {{.CLUSTER_NAME}}

  monitoring:up:
    desc: Install monitoring stack and forward Grafana to localhost:3000
    cmds:
      - task: monitoring:install
      - kubectl rollout status deployment/{{.GRAFANA_SERVICE_NAME}} -n {{.MONITORING_NAMESPACE}} --timeout=10m
      - task: monitoring:password
      - task: monitoring:grafana

  hpa:
    desc: Watch the HPA
    cmds:
      - kubectl get hpa -n {{.NAMESPACE}} -w

  load:k6:ramping:
    desc: Run the ramping k6 load test
    cmds:
      - k6 run loadtest/ramping.js

  load:k6:smoke:
    desc: Run the smoke k6 load test
    cmds:
      - k6 run loadtest/smoke.js

  load:k6:spike:
    desc: Run the spike k6 load test
    cmds:
      - k6 run loadtest/spike.js

  load:k6:constant:
    desc: Run the constant k6 load test
    cmds:
      - k6 run loadtest/constant.js

  cluster:create:
    internal: true
    cmds:
      - kind create cluster --config {{.KIND_CONFIG}}

  ingress:install:
    internal: true
    cmds:
      - kubectl apply -f {{.INGRESS_NGINX_MANIFEST_URL}}
      - |
        until kubectl get pods -n ingress-nginx -l app.kubernetes.io/component=controller -o name | grep -q .; do
          sleep 1
        done
      - kubectl wait --namespace ingress-nginx --for=condition=ready pod --selector=app.kubernetes.io/component=controller --timeout=5m

  metrics-server:apply:
    internal: true
    cmds:
      - kubectl apply -f {{.METRICS_SERVER_MANIFEST}}

  monitoring:install:
    internal: true
    desc: Install or upgrade kube-prometheus-stack
    cmds:
      - helm repo add {{.PROMETHEUS_REPO_NAME}} {{.PROMETHEUS_REPO_URL}} --force-update
      - helm repo update
      - kubectl create namespace {{.MONITORING_NAMESPACE}} --dry-run=client -o yaml | kubectl apply -f -
      - helm upgrade --install {{.MONITORING_RELEASE}} {{.MONITORING_CHART}} -n {{.MONITORING_NAMESPACE}}

  image:build:
    internal: true
    cmds:
      - docker build -t {{.IMAGE_NAME}} -f docker/Dockerfile .

  image:load:
    internal: true
    cmds:
      - kind load docker-image {{.IMAGE_NAME}} --name {{.CLUSTER_NAME}}

  k8s:apply:
    internal: true
    cmds:
      - kubectl apply -f deploy/k8s/namespace.yaml
      - kubectl apply -f deploy/k8s/deployment.yaml
      - kubectl apply -f deploy/k8s/service.yaml
      - kubectl apply -f deploy/k8s/ingress.yaml
      - kubectl apply -f deploy/k8s/hpa.yaml

  monitoring:grafana:
    desc: Forward Grafana to localhost:3000
    cmds:
      - kubectl port-forward svc/{{.GRAFANA_SERVICE_NAME}} 3000:80 -n {{.MONITORING_NAMESPACE}}

  monitoring:prometheus:
    desc: Forward Prometheus to localhost:9090
    cmds:
      - kubectl port-forward svc/{{.PROMETHEUS_SERVICE_NAME}} 9090:9090 -n {{.MONITORING_NAMESPACE}}

  monitoring:password:
    desc: Print the Grafana admin password
    cmds:
      - |
        PASSWORD=$(kubectl get secret -n {{.MONITORING_NAMESPACE}} -l app.kubernetes.io/component=admin-secret -o jsonpath="{.items[0].data.admin-password}" | base64 --decode)
        echo
        echo "Grafana login"
        echo "  URL:      http://localhost:3000"
        echo "  Username: admin"
        echo "  Password: ${PASSWORD}"
        echo
